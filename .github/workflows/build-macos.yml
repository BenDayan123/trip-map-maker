name: Build macOS app

# Builds TripMapMaker.app + .dmg on GitHub's macOS runners, so you don't need a
# Mac. Run it by hand (Actions tab -> Run workflow), or push a v* tag to also
# publish the .dmg files to a GitHub Release.
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write # needed for the release step on tags

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14 # Apple Silicon
            arch: arm64
          - os: macos-13 # Intel
            arch: x86_64
    runs-on: ${{ matrix.os }}
    name: build (${{ matrix.arch }})
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt streamlit-desktop-app

      - name: Build the .app and .dmg
        run: |
          chmod +x build_app.sh build_dmg.sh
          ./build_app.sh
          ./build_dmg.sh
          mv TripMapMaker.dmg "TripMapMaker-macos-${{ matrix.arch }}.dmg"

      - name: Upload the installer
        uses: actions/upload-artifact@v4
        with:
          name: TripMapMaker-macos-${{ matrix.arch }}
          path: TripMapMaker-macos-${{ matrix.arch }}.dmg
          if-no-files-found: error

      - name: Attach to the release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: TripMapMaker-macos-${{ matrix.arch }}.dmg
