name: Build macOS app

# Builds TripMapMaker.app + .dmg on GitHub's macOS runner, so you don't need a
# Mac. Run it by hand (Actions tab -> Run workflow), or push a v* tag to also
# publish the .dmg to a GitHub Release.
#
# Apple Silicon (arm64) only: it covers every Mac since late 2020 (M1+), and the
# hosted Intel (macos-13) runner is chronically unavailable — it queued 1h+ and
# never allocated. Re-add an Intel matrix leg only if you truly need it.
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write # needed for the release step on tags

jobs:
  build:
    runs-on: macos-14 # Apple Silicon
    name: build (arm64)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt streamlit-desktop-app

      - name: Build the .app and .dmg
        run: |
          chmod +x build_app.sh build_dmg.sh
          ./build_app.sh
          ./build_dmg.sh
          mv TripMapMaker.dmg "TripMapMaker-macos-arm64.dmg"

      - name: Upload the installer
        uses: actions/upload-artifact@v4
        with:
          name: TripMapMaker-macos-arm64
          path: TripMapMaker-macos-arm64.dmg
          if-no-files-found: error

      - name: Attach to the release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: TripMapMaker-macos-arm64.dmg
